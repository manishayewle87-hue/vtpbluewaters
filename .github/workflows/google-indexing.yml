name: Google Indexing API Daily Sync

on:
  schedule:
    # Run at 00:00 UTC (5:30 AM IST) — Morning batch
    - cron: '0 0 * * *'
    # Run at 12:00 UTC (5:30 PM IST) — Evening batch
    - cron: '0 12 * * *'
  workflow_dispatch: # Allows manual trigger directly from the GitHub UI

jobs:
  index-urls:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci

      - name: Run Programmatic SEO Pinger
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: node scripts/ping-programmatic-seo.js
